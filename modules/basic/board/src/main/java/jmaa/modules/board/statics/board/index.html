<!DOCTYPE html>
<html lang="zh-cmn-Hans">
  <head>
    <script>self["MonacoEnvironment"] = (function (paths) {
          return {
            globalAPI: false,
            getWorkerUrl : function (moduleId, label) {
              var result =  paths[label];
              if (/^((http:)|(https:)|(file:)|(\/\/))/.test(result)) {
                var currentUrl = String(window.location);
                var currentOrigin = currentUrl.substr(0, currentUrl.length - window.location.hash.length - window.location.search.length - window.location.pathname.length);
                if (result.substring(0, currentOrigin.length) !== currentOrigin) {
                  var js = '/*' + label + '*/importScripts("' + result + '");';
                  var blob = new Blob([js], { type: 'application/javascript' });
                  return URL.createObjectURL(blob);
                }
              }
              return result;
            }
          };
        })({
  "editorWorkerService": "/web/jmaa/modules/board/statics/board/monacoeditorwork/editor.worker.bundle.js",
  "typescript": "/web/jmaa/modules/board/statics/board/monacoeditorwork/ts.worker.bundle.js",
  "json": "/web/jmaa/modules/board/statics/board/monacoeditorwork/json.worker.bundle.js",
  "html": "/web/jmaa/modules/board/statics/board/monacoeditorwork/html.worker.bundle.js",
  "javascript": "/web/jmaa/modules/board/statics/board/monacoeditorwork/ts.worker.bundle.js",
  "handlebars": "/web/jmaa/modules/board/statics/board/monacoeditorwork/html.worker.bundle.js",
  "razor": "/web/jmaa/modules/board/statics/board/monacoeditorwork/html.worker.bundle.js"
});</script>
