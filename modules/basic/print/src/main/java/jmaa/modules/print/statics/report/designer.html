        let queryString = window.location.search;
        let urlParams = new URLSearchParams(queryString);
        let reportData = JSON.parse(decodeURIComponent(urlParams.get('d')));

            options.appearance.showReportTree = false;
            options.toolbar.showFileMenu = false;

            designer.visible = true;
            let report = new Stimulsoft.Report.StiReport();

            report.dictionary.databases.clear();
            let json = {"Data": reportData.data};
            let dataSet = new Stimulsoft.System.Data.DataSet("JSON");
            dataSet.readJson(json);
            report.regData("JSON", "JSON", dataSet);
            report.dictionary.synchronize();
            designer.report = report;
            designer.onSaveReport = function (args) {
                let reportJson = designer.report.saveToJsonString();
                save(reportJson);
                args.preventDefault = true;
            };
            designer.renderHtml("designerContent");
            for (let id of ['StiDesignerbuttonShare', 'StiDesignerbuttonPublish', 'StiDesigneraboutButton']) {

            btnDown.addEventListener('click', () => {
                let reportJson = designer.report.saveToJsonString();
                download(reportJson);
            });
            tool.appendChild(btnDown);
            let btnOpen = createButton('打开', 'data:image/webp;base64,UklGRvwAAABXRUJQVlA4TO8AAAAvF8AFEC/BKJIkRT3L5Ob8u7kf892yDcVt20ZK2i26/359XxbbSJKjtKsolbJC+MFEHj8gaiMpdXDBAf5fSDoU3KKA6P5/fdl4ki9TGCvdwXSHmF3MLrqL2UV30R3keptev5TDmwfnFt1lP18mIB0hBCVdD2UI3dGIRdrQYVMV3IaYLcOKAweRJCnSMTPj841/jz1/iwIi+j8BZP+RPyQ46LaHJMdtx9vzDcfxhiII+WQDd2T7OPxfPsCvQ+HmBVcqNv6gjYTihYhGtw+Fsx38Wqw64UrFug+0kVAwEfShcLwytVj+ZFKx5s3I/IL1AQA=');
            btnOpen.addEventListener('click', () => {
                designer.jsObject.ActionOpenReport();
            });
            tool.appendChild(btnOpen);
            designer.jsObject.options.workPanel.querySelector('#StiDesignersaveReportHotButton').parentNode.parentNode.appendChild(tool);
            setTimeout(() => document.title = reportData.title + " - 设计", 2000);
        }

        function download(reportJson) {
            let blob = new Blob([reportJson], {type: "application/json"});
            let url = URL.createObjectURL(blob);
            let a = document.createElement("a");
            a.href = url;
            a.download = reportData.title + ".mrt";
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        function save(reportJson) {
            let formData = new FormData()
            formData.set('fileName', reportData.title + ".mrt");
            formData.set('template', reportJson);
            fetch(reportData.tenant + "/print/save/" + reportData.id, {
                method: 'POST',
                body: formData
            }).then(response => {
                if (!response.ok) {
                    response.text().then(r => console.error('Error:', r));
                }
            }).catch((error) => {
                console.error('Error:', error);
            });
        }

        function createButton(text, img) {
            let btn = document.createElement('div');
            btn.style.height = "30px";
            btn.classList.add(
                'stiDesignerStandartSmallButton',
                'stiDesignerStandartSmallButton_Mouse',
                'stiDesignerStandartSmallButtonDefault'
            );
            btn.addEventListener('mouseover', () => {
                btn.classList.remove('stiDesignerStandartSmallButtonDefault');
                btn.classList.add('stiDesignerStandartSmallButtonOver');
            });
            btn.addEventListener('mouseout', () => {
                btn.classList.remove('stiDesignerStandartSmallButtonOver');
                btn.classList.add('stiDesignerStandartSmallButtonDefault');
            });
            btn.innerHTML = `<table class="stiDesignerClearAllStyles" cellpadding="0" cellspacing="0" style="height: 100%;">
                <tr class="stiDesignerClearAllStyles">
                    <td class="stiDesignerClearAllStyles" style="padding: 0px 4px; text-align: center; font-size: 0px;">
                        <img src="${img}" style="pointer-events: none; width: 16px; height: 16px; opacity: 1;">
                    </td>
                    <td class="stiDesignerClearAllStyles" style="padding: 0px 10px 0px 0px; white-space: nowrap; text-align: left;">${text}</td>
                </tr>
            </table>`;
            return btn;
        }

        function onBodyLoad() {
            createDesigner();
        }
    </script>
</head>

</body>
</html>
